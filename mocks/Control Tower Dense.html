  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

* ---------- Agent card ---------- */\n\n  .agent-card {\n    position: relative;\n    border: 1px solid var(--line);\n    border-left: 3px solid var(--line);\n    background: var(--panel-2);\n    border-radius: 7px;\n    padding: 8px 10px 9px;\n    text-align: left;\n    color: var(--text);\n    min-width: 0;\n    cursor: pointer;\n    transition: border-color 0.15s, background 0.15s, transform 0.15s;\n  }\n  .agent-card:hover { border-color: var(--line-strong); background: var(--panel-3); }\n  .agent-card.working { border-left-color: var(--green); }\n  .agent-card.completed {\n    border-left-color: var(--green);\n    background: var(--green-soft);\n    border-color: rgba(22, 132, 58, 0.32);\n  }\n  .agent-card.completed:hover { background: var(--green-soft); }\n\n  /* ---- Compact \"Ready to merge\" one-liner ---- */\n  .agent-card.compact {\n    padding: 0;\n    min-height: 0;\n  }\n  .agent-card.compact .compact-row {\n    display: grid;\n    grid-template-columns: 8px minmax(0, 1fr) auto auto auto;\n    gap: 10px;\n    align-items: center;\n    padding: 7px 10px;\n    min-height: 34px;\n  }\n  .agent-card.compact .compact-name {\n    font-family: var(--mono);\n    font-weight: 700;\n    color: var(--text-strong);\n    font-size: 12.5px;\n    overflow: hidden;\n    text-overflow: ellipsis;\n    white-space: nowrap;\n  }\n  .agent-card.compact .compact-meta {\n    color: var(--muted);\n    font-weight: 400;\n    font-family: var(--mono);\n    font-size: 10.5px;\n    margin-left: 8px;\n  }\n  .agent-card.compact .state-pill { font-size: 9px; padding: 1px 6px; }\n  .agent-card.compact .mini-btn { padding: 2px 7px; font-size: 11px; }\n\n  /* ---- Inline expand body (animated via max-height) ---- */\n  .agent-card .expand-body {\n    max-height: 0;\n    overflow: hidden;\n    transition: max-height 0.25s ease;\n  }\n  .agent-card.is-expanded .expand-body {\n    max-height: 600px;\n  }\n  .agent-card .expand-content {\n    padding: 8px 10px 9px;\n    border-top: 1px dashed var(--line-soft);\n  }\n  /* Working cards have their own inner padding; their expand-content uses the card's flow */\n  .agent-card.working .expand-content,\n  .agent-card.silent .expand-content,\n  .agent-card.dormant .expand-content {\n    padding: 7px 0 0;\n    margin-top: 7px;\n  }\n\n  /* The expand-content's actions-list shouldn't get a second top-border */\n  .agent-card .expand-content .actions-list {\n    margin-top: 0;\n    padding-top: 0;\n    border-top: 0;\n  }\n\n  /* Inline \"card hint\" (replaces the Ask Supervisor button on working cards) */\n  .card-hint {\n    color: var(--muted-2);\n    font-family: var(--mono);\n    font-size: 9.5px;\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    opacity: 0;\n    transition: opacity 0.14s ease;\n  }\n  .agent-card:hover .card-hint,\n  .agent-card:focus-visible .card-hint { opacity: 1; }\n  .agent-card.is-expanded .card-hint { opacity: 0; }\n\n  /* Foot row inside the expand body (Open in Supervisor link) */\n  .expand-foot {\n    display: flex;\n    justify-content: flex-end;\n    margin-top: 6px;\n    padding-top: 5px;\n    border-top: 1px dashed var(--line-soft);\n  }\n  .expand-supervisor-link {\n    display: inline-flex; align-items: center; gap: 6px;\n    border: 1px solid rgba(173, 108, 22, 0.45);\n    background: linear-gradient(180deg, color-mix(in srgb, var(--amber-soft), white 12%), var(--amber-soft));\n    color: var(--amber);\n    font-family: var(--sans);\n    font-size: 11px;\n    font-weight: 600;\n    border-radius: 5px;\n    padding: 3px 9px;\n    cursor: pointer;\n    box-shadow:\n      inset 0 1px 0 rgba(255, 255, 255, 0.5),\n      0 1px 0 rgba(20, 16, 10, 0.04),\n      0 1px 3px rgba(20, 16, 10, 0.08);\n    transition: border-color 0.12s, background 0.12s, color 0.12s, transform 0.1s, box-shadow 0.1s;\n  }\n  .expand-supervisor-link:hover {\n    color: var(--text-strong);\n    border-color: var(--amber);\n    background: rgba(173, 108, 22, 0.16);\n  }\n  .expand-supervisor-link:active {\n    transform: translateY(1px);\n    box-shadow: inset 0 2px 3px rgba(20, 16, 10, 0.15);\n  }\n  .expand-supervisor-link .ic { width: 11px; height: 11px; }\n\n  /* (Old corner-chevron rotation rule removed — affordance now lives in card-foot.) */\n  .agent-card.silent { border-left-color: var(--yellow); }\n  .agent-card.dormant { border-left-color: var(--muted-2); }\n  .agent-card.attention {\n    border-left-color: var(--red);\n    background: var(--red-soft);\n    border-color: rgba(200, 55, 50, 0.42);\n  }\n  .agent-card.attention:hover { background: var(--red-soft); }\n  .agent-card.merged {\n    opacity: 0.55;\n    border-left-color: var(--muted-2);\n    background: var(--panel);\n    transition: opacity 0.4s ease, background 0.4s ease;\n  }\n  .agent-card.merged .mini-btn.merge {\n    border-color: var(--line);\n    background: var(--panel-2);\n    color: var(--muted);\n  }\n\n  .card-top {\n    display: grid;\n    grid-template-columns: 8px minmax(0, 1fr) auto;\n    gap: 8px;\n    align-items: center;\n  }\n  .status-dot {\n    width: 8px; height: 8px; border-radius: 999px; display: inline-block;\n  }\n  .status-working { background: var(--green); box-shadow: 0 0 8px var(--green); }\n  .status-completed { background: var(--green); box-shadow: 0 0 10px var(--green); }\n  .status-silent { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }\n  .status-dormant { background: var(--muted-2); }\n  .status-problem { background: var(--red); box-shadow: 0 0 10px var(--red); }\n\n  .agent-name {\n    font-family: var(--mono);\n    color: var(--text-strong);\n    font-weight: 700;\n    font-size: 13px;\n    overflow: hidden;\n    white-space: nowrap;\n    text-overflow: ellipsis;\n  }\n  .agent-name .sep-mid {\n    color: var(--muted-2);\n    font-weight: 400;\n    margin: 0 6px;\n  }\n  .agent-name .src {\n    color: var(--muted);\n    font-weight: 500;\n    font-size: 11px;\n    text-transform: uppercase;\n    letter-spacing: 0.08em;\n  }\n  .time-chip {\n    color: var(--muted);\n    font-family: var(--mono);\n    font-size: 11px;\n    white-space: nowrap;\n  }\n\n  .agent-goal {\n    margin-top: 5px;\n    color: var(--text);\n    font-size: 11.5px;\n    line-height: 1.3;\n    display: -webkit-box;\n    -webkit-line-clamp: 1;\n    -webkit-box-orient: vertical;\n    overflow: hidden;\n  }\n  .agent-goal::before {\n    content: \"GOAL\";\n    font-family: var(--mono);\n    font-size: 9px;\n    color: var(--muted);\n    letter-spacing: 0.14em;\n    margin-right: 8px;\n    vertical-align: 1px;\n  }\n\n  .progress-line {\n    display: grid;\n    grid-template-columns: minmax(0, 1fr) auto auto auto auto;\n    gap: 9px;\n    align-items: center;\n    margin-top: 6px;\n  }\n  .progress-track {\n    height: 6px;\n    background: var(--panel-3);\n    border: 1px solid var(--line-soft);\n    border-radius: 999px;\n    overflow: hidden;\n  }\n  .agent-card.attention .progress-track { background: rgba(200, 55, 50, 0.10); }\n  .progress-fill {\n    height: 100%; width: 0;\n    background: linear-gradient(90deg, var(--blue), var(--green));\n    border-radius: 999px;\n  }\n  .progress-fill.attention { background: linear-gradient(90deg, var(--yellow), var(--red)); }\n  .progress-fill.done { background: var(--green); }\n  .progress-chip {\n    font-family: var(--mono);\n    font-size: 10.5px;\n    color: var(--text-strong);\n    white-space: nowrap;\n  }\n  .progress-chip.muted { color: var(--muted); }\n  .progress-chip.sep {\n    color: var(--muted-2);\n  }\n\n  .state-pill {\n    display: inline-flex; align-items: center; gap: 5px;\n    padding: 2px 7px;\n    border-radius: 4px;\n    font-family: var(--mono);\n    font-size: 9.5px;\n    text-transform: uppercase;\n    letter-spacing: 0.08em;\n    border: 1px solid var(--line);\n    background: var(--panel);\n    color: var(--muted);\n    white-space: nowrap;\n  }\n  .state-pill.work { color: var(--green); background: var(--green-soft); border-color: rgba(22, 132, 58, 0.32); }\n  .state-pill.done { color: var(--green); background: var(--green-soft); border-color: rgba(22, 132, 58, 0.45); font-weight: 600; }\n  .state-pill.attention { color: var(--red); background: rgba(200, 55, 50, 0.14); border-color: rgba(200, 55, 50, 0.45); }\n  .state-pill.went-dark {\n    color: var(--red);\n    background: rgba(200, 55, 50, 0.16);\n    border-color: rgba(200, 55, 50, 0.55);\n    font-size: 11px;\n    font-weight: 700;\n    padding: 3px 9px 3px 7px;\n    letter-spacing: 0.1em;\n    gap: 6px;\n  }\n  .state-pill.went-dark::before {\n    content: \"\";\n    width: 7px; height: 7px;\n    border-radius: 50%;\n    background: var(--red);\n    box-shadow: 0 0 0 0 rgba(200, 55, 50, 0.55);\n    animation: pulse-dark 1.6s ease-in-out infinite;\n  }\n  @keyframes pulse-dark {\n    0%   { box-shadow: 0 0 0 0 rgba(200, 55, 50, 0.55); }\n    70%  { box-shadow: 0 0 0 6px rgba(200, 55, 50, 0); }\n    100% { box-shadow: 0 0 0 0 rgba(200, 55, 50, 0); }\n  }\n\n  .actions-list {\n    margin-top: 7px;\n    border-top: 1px dashed var(--line-soft);\n    padding-top: 6px;\n    display: grid;\n    gap: 3px;\n  }\n  .actions-head {\n    display: flex; align-items: center; justify-content: space-between;\n    color: var(--muted);\n    font-family: var(--mono);\n    font-size: 9.5px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    margin-bottom: 2px;\n  }\n  .actions-head .ic {\n    display: inline-flex; gap: 5px; align-items: center;\n  }\n  .actions-head .spark {\n    display: inline-flex; gap: 2px; align-items: end; height: 10px;\n  }\n  .actions-head .spark i {\n    width: 3px; min-height: 2px; background: var(--line-strong); border-radius: 1px;\n  }\n  .actions-head .spark i.good { background: var(--green); }\n  .actions-head .spark i.bad { background: var(--red); }\n  .actions-head .spark i.neutral { background: var(--blue); }\n\n  .act {\n    display: grid;\n    grid-template-columns: 52px 14px minmax(0, 1fr) auto;\n    gap: 6px;\n    align-items: start;\n    font-size: 11.5px;\n    line-height: 1.3;\n  }\n  .act time {\n    color: var(--muted);\n    font-family: var(--mono);\n    font-size: 10.5px;\n    text-align: right;\n    font-variant-numeric: tabular-nums;\n    line-height: 14.95px;\n    white-space: nowrap;\n  }\n  .act .ic {\n    display: inline-flex;\n    justify-content: center;\n    align-items: center;\n    height: 14.95px;\n    color: var(--muted-2);\n  }\n  .act .ic i { width: 10px; height: 10px; }\n  .act.milestone .ic { color: var(--green); }\n  .act.problem .ic { color: var(--red); }\n  .act.checkpoint .ic { color: var(--blue); }\n  .act .txt {\n    color: var(--text);\n    overflow-wrap: anywhere;\n  }\n  .act.lead .txt { color: var(--text-strong); font-weight: 500; }\n  .act .tag {\n    display: inline;\n    color: var(--muted);\n    font-family: var(--mono);\n    font-size: 10px;\n    margin-right: 4px;\n  }\n  .act.checkpoint .tag { color: var(--blue); }\n  .act.problem .tag { color: var(--red); }\n\n  .sha-copy {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    width: 16px;\n    height: 14.95px;\n    margin: 0;\n    padding: 0;\n    border: 0;\n    background: transparent;\n    color: var(--muted-2);\n    cursor: pointer;\n    border-radius: 3px;\n    opacity: 0.7;\n    transition: color 0.12s, opacity 0.12s, background 0.12s;\n  }\n  .sha-copy:hover {\n    color: var(--amber);\n    opacity: 1;\n    background: var(--amber-soft);\n  }\n  .sha-copy .ic { display: inline-flex; }\n  .sha-copy svg { width: 11px; height: 11px; }\n\n  /* ---------- Triage filter dimming ---------- */\n  body[data-filter] .agent-card { transition: opacity 0.2s ease, filter 0.2s ease; }\n  body[data-filter=\"went-dark\"] .agent-card:not(.attention),\n  body[data-filter=\"ready\"] .agent-card:not(.completed),\n  body[data-filter=\"safe\"] .agent-card.attention,\n  body[data-filter=\"safe\"] .agent-card.completed {\n    opacity: 0.32;\n    filter: saturate(0.4);\n  }\n\n  /* ---------- Custom tooltip ---------- */\n  [data-tooltip] { position: relative; }\n  [data-tooltip]:hover::after,\n  [data-tooltip]:focus-visible::after {\n    content: attr(data-tooltip);\n    position: absolute;\n    top: calc(100% + 6px);\n    right: 0;\n    width: max-content;\n    max-width: 240px;\n    white-space: normal;\n    background: var(--text-strong);\n    color: var(--bg);\n    padding: 8px 10px;\n    border-radius: 5px;\n    font-size: 11.5px;\n    line-height: 1.4;\n    font-family: var(--sans);\n    font-weight: 400;\n    z-index: 100;\n    box-shadow: 0 6px 18px rgba(20, 16, 10, 0.25);\n    pointer-events: none;\n  }\n\n  .toast {\n    position: fixed;\n    left: 50%;\n    bottom: 64px;\n    transform: translate(-50%, 12px);\n    background: var(--text-strong);\n    color: var(--bg);\n    font-family: var(--mono);\n    font-size: 12px;\n    padding: 8px 14px;\n    border-radius: 6px;\n    box-shadow: 0 8px 24px rgba(20, 16, 10, 0.28);\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity 0.18s ease, transform 0.18s ease;\n    z-index: 60;\n  }\n  .toast.show {\n    opacity: 1;\n    transform: translate(-50%, 0);\n  }\n\n  /* ---------- card footer ---------- */\n  .card-foot {\n    margin-top: 7px;\n    display: flex; align-items: center; justify-content: space-between;\n    gap: 8px;\n    color: var(--muted);\n    font-family: var(--mono);\n    font-size: 10.5px;\n  }\n  .card-foot .stats {\n    display: inline-flex; gap: 10px;\n  }\n  .card-foot .stats span strong {\n    color: var(--text-strong);\n    font-weight: 600;\n    margin-right: 3px;\n    font-family: var(--mono);\n  }\n  .card-foot .right {\n    display: inline-flex; gap: 6px; align-items: center;\n  }\n  .mini-btn {\n    display: inline-flex; align-items: center; gap: 5px;\n    border: 1px solid var(--line);\n    background: linear-gradient(180deg, color-mix(in srgb, var(--panel), white 7%), var(--panel));\n    color: var(--text);\n    border-radius: 5px;\n    padding: 3px 7px;\n    font-size: 11px;\n    font-family: var(--sans);\n    box-shadow:\n      inset 0 1px 0 rgba(255, 255, 255, 0.5),\n      0 1px 0 rgba(20, 16, 10, 0.04),\n      0 1px 3px rgba(20, 16, 10, 0.08);\n    transition: border-color 0.12s, background 0.12s, color 0.12s, transform 0.1s, box-shadow 0.1s;\n  }\n  .mini-btn:hover { border-color: var(--amber); color: var(--text-strong); }\n  .mini-btn:active { transform: translateY(1px); box-shadow: inset 0 2px 3px rgba(20, 16, 10, 0.15); }\n  .mini-btn .ic { width: 11px; height: 11px; }\n  .mini-btn.rescue {\n    border-color: rgba(200, 55, 50, 0.45);\n    background: var(--red-soft);\n    color: var(--red);\n    font-weight: 600;\n  }\n  .mini-btn.rescue:hover { background: rgba(200, 55, 50, 0.15); }\n  .mini-btn.supervisor {\n    border-color: rgba(173, 108, 22, 0.45);\n    background: var(--amber-soft);\n    color: var(--amber);\n    font-weight: 600;\n  }\n  .mini-btn.supervisor:hover { background: rgba(173, 108, 22, 0.16); color: var(--text-strong); }\n  .mini-btn.merge {\n    border-color: rgba(22, 132, 58, 0.55);\n    background: rgba(22, 132, 58, 0.12);\n    color: var(--green);\n    font-weight: 600;\n  }\n  .mini-btn.merge:hover { background: rgba(22, 132, 58, 0.20); color: var(--text-strong); }\n\n  .cost-stat {\n    display: inline-flex;\n    align-items: center;\n    gap: 4px;\n  }\n  .cost-stat .cost-of { color: var(--muted-2); font-weight: 400; }\n  .cost-stat.caution strong { color: var(--yellow); }\n  .cost-stat.warn strong { color: var(--red); }\n  .cost-meter {\n    display: inline-block;\n    width: 28px;\n    height: 4px;\n    margin-left: 5px;\n    background: var(--line-soft);\n    border-radius: 999px;\n    overflow: hidden;\n    vertical-align: middle;\n  }\n  .cost-meter-fill {\n    display: block;\n    height: 100%;\n    width: 0;\n    background: var(--green);\n    transition: width 0.3s ease;\n  }\n  .cost-stat.caution .cost-meter-fill { background: var(--yellow); }\n  .cost-stat.warn .cost-meter-fill { background: var(--red); }\n\n  /* ---------- Right rail ---------- */\n\n  .rail { display: grid; gap: 10px; min-width: 0; }\n  .rail-card { padding: 10px 12px; }\n  .rail-card .panel-head { padding: 0 0 8px; }\n\n  .console-empty { color: var(--muted); font-size: 12px; }\n  .console-body { display: grid; gap: 8px; }\n  .console-title {\n    font-family: var(--mono);\n    color: var(--text-strong);\n    font-weight: 700;\n    font-size: 13px;\n    overflow-wrap: anywhere;\n  }\n  .console-diag {\n    border-left: 3px solid var(--line-strong);\n    background: var(--panel-2);\n    padding: 7px 9px;\n    border-radius: 5px;\n    font-size: 12px;\n  }\n  .console-diag.attention {\n    border-left-color: var(--red);\n    background: var(--red-soft);\n  }\n  .console-diag strong {\n    display: block;\n    color: var(--text-strong);\n    font-size: 12.5px;\n    margin-bottom: 2px;\n  }\n  .console-diag.attention strong { color: var(--red); }\n  .console-actions {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 6px;\n    margin-top: 2px;\n  }\n  .console-actions .btn {\n    padding: 5px 8px;\n    min-height: 28px;\n    font-size: 11.5px;\n    justify-content: center;\n  }\n  .console-supervisor.btn {\n    padding: 7px 10px;\n    justify-content: center;\n    min-height: 32px;\n    font-size: 12px;\n  }\n  .console-meta {\n    display: flex; flex-wrap: wrap; gap: 6px;\n    font-family: var(--mono);\n    font-size: 10.5px;\n    color: var(--muted);\n  }\n\n  .traffic-row {\n    display: grid;\n    grid-template-columns: 40px 10px minmax(0, 1fr);\n    gap: 8px;\n    align-items: baseline;\n    font-size: 12px;\n    line-height: 1.3;\n    padding: 5px 0;\n    border-top: 1px dashed var(--line-soft);\n  }\n  .traffic-row:first-child { border-top: 0; padding-top: 0; }\n  .traffic-row time {\n    color: var(--muted);\n    font-family: var(--mono);\n    font-size: 10.5px;\n    text-align: right;\n    white-space: nowrap;\n  }\n  .traffic-row .task {\n    color: var(--text-strong);\n    font-family: var(--mono);\n    font-size: 11px;\n    margin-right: 5px;\n  }\n  .traffic-row .body { color: var(--text); }\n\n  .commit-row {\n    display: grid;\n    grid-template-columns: auto auto minmax(0, 1fr);\n    gap: 8px;\n    align-items: baseline;\n    font-size: 12px;\n    padding: 5px 0;\n    border-top: 1px dashed var(--line-soft);\n  }\n  .commit-row:first-child { border-top: 0; padding-top: 0; }\n  .commit-sha {\n    color: var(--amber);\n    font-family: var(--mono);\n    font-size: 11px;\n  }\n  .commit-when {\n    color: var(--muted);\n    font-family: var(--mono);\n    font-size: 10.5px;\n  }\n  .commit-msg { color: var(--text); }\n\n  /* ---------- Footer ---------- */\n  footer.portfolio {\n    margin-top: 14px;\n    left: 0; right: 0;\n    display: grid;\n    grid-template-columns: minmax(220px, 1fr) auto;\n    gap: 14px;\n    align-items: center;\n    min-height: 44px;\n    padding: 8px 16px;\n    background: var(--footer);\n    border-top: 1px solid var(--line);\n    font-size: 12px;\n  }\n  .portfolio-note strong {\n    color: var(--text-strong);\n    font-family: var(--serif);\n    font-size: 14px;\n    margin-right: 8px;\n  }\n  .portfolio-note span { color: var(--muted); font-size: 11px; }\n  .portfolio-card {\n    display: inline-flex; gap: 8px; align-items: center;\n    color: var(--text);\n  }\n  .portfolio-card .who { color: var(--muted-2); font-size: 11px; }\n  .portfolio-card a {\n    color: var(--text);\n    text-decoration: none;\n    border: 1px solid var(--line);\n    background: var(--panel);\n    border-radius: 5px;\n    padding: 4px 8px;\n    display: inline-flex; align-items: center; gap: 6px;\n    font-size: 11.5px;\n  }\n  .portfolio-card a:hover { border-color: var(--amber); color: var(--text-strong); }\n  .portfolio-card a .ic { width: 12px; height: 12px; }\n  .portfolio-card a.social-link {\n    border: 0;\n    background: none;\n    padding: 4px;\n    color: var(--muted);\n  }\n  .portfolio-card a.social-link:hover { color: var(--text-strong); background: none; }\n  .portfolio-card a.social-link svg { width: 16px; height: 16px; }\n\n  /* ---------- Supervisor drawer ---------- */\n  .drawer-backdrop {\n    position: fixed;\n    inset: 0;\n    background: rgba(20, 16, 10, 0);\n    backdrop-filter: blur(0px);\n    pointer-events: none;\n    transition: background 0.18s ease, backdrop-filter 0.18s ease;\n    z-index: 40;\n  }\n  .drawer-backdrop.open {\n    background: rgba(20, 16, 10, 0.28);\n    backdrop-filter: blur(2px);\n    pointer-events: auto;\n  }\n  .drawer {\n    position: fixed;\n    top: 14px;\n    right: 14px;\n    bottom: 58px;\n    width: 420px;\n    max-width: calc(100vw - 28px);\n    transform: translateX(calc(100% + 24px));\n    transition: transform 0.22s cubic-bezier(.4,.0,.2,1);\n    z-index: 41;\n    display: flex;\n    flex-direction: column;\n    overflow: hidden;\n  }\n  .drawer.open { transform: translateX(0); }\n  .drawer-head {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 12px 14px;\n    border-bottom: 1px solid var(--line-soft);\n  }\n  .drawer-head .title-block { display: flex; flex-direction: column; gap: 2px; min-width: 0; }\n  .drawer-head .eyebrow {\n    color: var(--red);\n    font-family: var(--mono);\n    font-size: 10px;\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    display: inline-flex; align-items: center; gap: 6px;\n  }\n  .drawer-head .eyebrow .dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--red);\n    box-shadow: 0 0 0 3px rgba(200, 55, 50, 0.18);\n  }\n  .drawer-head h2 {\n    margin: 0;\n    font-family: var(--serif);\n    font-size: 18px;\n    color: var(--text-strong);\n    line-height: 1.15;\n  }\n  .drawer-close {\n    border: 1px solid var(--line);\n    background: var(--panel-2);\n    color: var(--muted);\n    border-radius: 5px;\n    width: 28px; height: 28px;\n    display: Streaming embeddings into the new index — 64% through the corpus.\" },\n        { ms: secs(58), kind: \"checkpoint\", tag: \"1/3\", sha: \"55c0a3e\", text: \"Chunker swapped over and re-embed pipeline is running cleanly.\" },\n        { ms: mins(2),  kind: \"normal\", text: \"Validated chunk boundaries on the long docs — no orphan tokens left behind.\" },\n        { ms: mins(5),  kind: \"normal\", tag: \"plan\", text: \"Plan: 3 checkpoints — swap chunker, re-embed corpus, recall eval.\" },\n      ],\n    },\n    {\n      task: \"Lint sweep\",\n      source: \"Codex\",\n      sourceKey: \"codex\",\n      state: \"completed\",\n      stateLabel: \"Ready to merge\",\n      stateClass: \"done\",\n      goal: \"Land the lint config bump and clear the long tail of warnings before merge week.\",\n      checkpoint: { current: 3, total: 3, pct: 100, label: \"Final pass clean. Branch is ahead by 4 commits and ready.\" },\n      tokens: \"7.4k\",\n      cost: \"$0.21\",\n      costCeiling: 1,\n      costNum: 0.21,\n      spark: [\"good\",\"neutral\",\"good\",\"good\",\"neutral\",\"good\",\"good\",\"good\"],\n      events: [\n        { ms: mins(1.6),kind: \"milestone\", tag: \"done\", sha: \"8ee44b2\", text: \"All warnings cleared. CI is green on the bumped config across both runners.\" },\n        { ms: mins(4),  kind: \"checkpoint\", tag: \"3/3\", sha: \"a797811\", text: \"Auto-fixable rules applied across the workspace, no behavior changes.\" },\n        { ms: mins(7),  kind: \"checkpoint\", tag: \"2/3\", sha: \"d1c7b6a\", text: \"New rule set staged behind a flag so the diff is reviewable.\" },\n        { ms: mins(12), kind: \"normal\", tag: \"plan\", text: \"Plan: 3 checkpoints — stage rules, autofix sweep, final manual pass.\" },\n      ],\n    },\n  ];\n\n  const TRAFFIC = [\n    { ms: secs(25),  task: \"Phase 5.5\",     body: \"Progress 3/4 — Browser check on mobile spacing is green and docs are queued.\" },\n    { ms: secs(26),  task: \"Phase 6\",       body: \"Progress 3/4 — Route smoke test is passing on Windows and Claude paths.\" },\n    { ms: secs(47),  task: \"Docs polish\",   body: \"Tightening the install notes so Windows-first readers see the one-click installer up top.\" },\n    { ms: secs(55),  task: \"Phase 6\",       body: \"Progress 1/4 — Request parser accepts the override hint from the dashboard.\" },\n    { ms: mins(2),   task: \"Phase 5.5\",     body: \"Pulling the DaisyUI tokens into the existing palette without losing the warm cream.\" },\n    { ms: mins(4),   task: \"Auth cleanup\",  body: \"Stopped without an end pulse. Login proof never ran.\" },\n    { ms: mins(6),   task: \"Docs polish\",   body: \"Plan: 3 checkpoints — opener, screenshots, install pass.\" },\n  ];\n\n  const COMMITS = [\n    { sha: \"e088a37\", when: \"25m ago\", msg: \"Tighten checkpoint stop enforcement\" },\n    { sha: \"a712fb8\", when: \"62m ago\", msg: \"Redesign Control Tower portfolio UI\" },\n    { sha: \"43ec4c4\", when: \"2h ago\",  msg: \"Restore completed-card expand behavior\" },\n    { sha: \"a797811\", when: \"2h ago\",  msg: \"Show completed cards as plain divs\" },\n    { sha: \"9d2c105\", when: \"3h ago\",  msg: \"Wire DaisyUI tokens into shared palette\" },\n  ];\n\n  // ----- Helpers -----\n  function relTime(ms) {\n    const sec = Math.max(0, Math.floor((NOW - ms) / 1000));\n    if (sec < 5) return \"just now\";\n    if (sec < 60) return sec + \"s ago\";\n    if (sec < 3600) {\n      const m = sec / 60;\n      return (m < 10 ? m.toFixed(1).replace(/\\.0$/, \"\") : Math.floor(m)) + \"m ago\";\n    }\n    return Math.floor(sec / 3600) + \"h ago\";\n  }\n\n  function escape(s) {\n    return String(s).replace(/[&<>\"']/g, c => ({\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",\"\\\"\":\"&quot;\",\"'\":\"&#39;\"}[c]));\n  }\n\n  function iconFor(kind) {\n    if (kind === \"milestone\") return \"check-circle-2\";\n    if (kind === \"checkpoint\") return \"circle-check-big\";\n    if (kind === \"problem\") return \"alert-triangle\";\n    return null;\n  }\n\n  // Render a list of agent events (used inline + in drawer).\n  function renderEventsList(a, limit, headerLabel) {\n    const eventsHtml = (a.events || []).slice(0, limit).map((ev, i) => {\n      const tagHtml = ev.tag ? `<span class=\"tag\">${escape(ev.tag)}<\u002Fspan>` : \"\";\n      const shaHtml = ev.sha ? `<button class=\"sha-copy\" data-sha=\"${escape(ev.sha)}\" type=\"button\" title=\"Copy ${escape(ev.sha)}\" aria-label=\"Copy commit ${escape(ev.sha)}\"><i class=\"ic\" data-lucide=\"git-commit-horizontal\"><\u002Fi><\u002Fbutton>` : \"\";\n      return `\n        <div class=\"act ${ev.kind} ${i === 0 ? \"lead\" : \"\"}\">\n          <time>${escape(relTime(ev.ms))}<\u002Ftime>\n          <span class=\"ic\">${iconFor(ev.kind) ? `<i data-lucide=\"${iconFor(ev.kind)}\"><\u002Fi>` : ''}<\u002Fspan>\n          <div class=\"txt\">${tagHtml}${escape(ev.text)}<\u002Fdiv>\n          ${shaHtml}\n        <\u002Fdiv>`;\n    }).join(\"\");\n    return `\n      <div class=\"actions-list\">\n        <div class=\"actions-head\"><span class=\"ic\"><i data-lucide=\"activity\" style=\"width:11px;height:11px\"><\u002Fi>${escape(headerLabel)}<\u002Fspan><\u002Fdiv>\n        ${eventsHtml}\n      <\u002Fdiv>`;\n  }\n\n  // Expand body factory: inline-expandable section that animates open.\n  function renderExpandBody(innerHtml) {\n    return `\n      <div class=\"expand-body\">\n        <div class=\"expand-inner\">\n          <div class=\"expand-content\">${innerHtml}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  }\n\n  // Tier 1 — full attention card (everything, including last 3 actions)\n  function renderAttentionCard(a) {\n    return `\n      <article class=\"agent-card attention\" tabindex=\"0\" data-task=\"${escape(a.task)}\">\n        <div class=\"card-top\">\n          <span class=\"status-dot status-problem\"><\u002Fspan>\n          <div class=\"agent-name\">${escape(a.task)}<\u002Fdiv>\n          <span class=\"time-chip\">${escape(relTime(a.events[0].ms))}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"agent-goal\">${escape(a.goal)}<\u002Fdiv>\n        <div class=\"progress-line\">\n          <div class=\"progress-track\"><div class=\"progress-fill attention\" style=\"width:${a.checkpoint.pct}%\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"progress-chip\"><strong>${a.checkpoint.current}/${a.checkpoint.total}<\u002Fstrong><\u002Fspan>\n          <span class=\"progress-chip muted\">${a.checkpoint.pct}%<\u002Fspan>\n          <span class=\"progress-chip sep\">·<\u002Fspan>\n          <span class=\"state-pill ${a.stateClass}\">${escape(a.stateLabel)}<\u002Fspan>\n        <\u002Fdiv>\n        ${renderEventsList(a, 3, \"Last 3 actions\")}\n        <div class=\"card-foot\">\n          <div class=\"stats\">\n            <span><strong>${escape(a.tokens)}<\u002Fstrong>tok<\u002Fspan>\n            <span><strong>${escape(a.cost)}<\u002Fstrong>cost<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"right\"><button class=\"mini-btn rescue\" type=\"button\"><i class=\"ic\" data-lucide=\"scan-search\"><\u002Fi>Ask Supervisor<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>`;\n  }\n\n  // Tier 2 — working card: tight by default; click to expand inline (last 5 events + Supervisor link).\n  function renderWorkingCard(a) {\n    const expandInner = `\n      ${renderEventsList(a, 5, \"Last 5 actions\")}\n      <div class=\"expand-foot\">\n        <button class=\"expand-supervisor-link\" type=\"button\" data-task=\"${escape(a.task)}\"><i class=\"ic\" data-lucide=\"scan-search\"><\u002Fi>Open in Supervisor<\u002Fbutton>\n      <\u002Fdiv>`;\n    return `\n      <article class=\"agent-card ${a.state}\" tabindex=\"0\" data-task=\"${escape(a.task)}\">\n        <div class=\"card-top\">\n          <span class=\"status-dot status-${a.state}\"><\u002Fspan>\n          <div class=\"agent-name\">${escape(a.task)}<\u002Fdiv>\n          <span class=\"time-chip\">${escape(relTime(a.events[0].ms))}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"agent-goal\">${escape(a.goal)}<\u002Fdiv>\n        <div class=\"progress-line\">\n          <div class=\"progress-track\"><div class=\"progress-fill\" style=\"width:${a.checkpoint.pct}%\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"progress-chip\"><strong>${a.checkpoint.current}/${a.checkpoint.total}<\u002Fstrong><\u002Fspan>\n          <span class=\"progress-chip muted\">${a.checkpoint.pct}%<\u002Fspan>\n          <span class=\"progress-chip sep\">·<\u002Fspan>\n          <span class=\"state-pill ${a.stateClass}\">${escape(a.stateLabel)}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"card-foot\">\n          <div class=\"stats\">\n            <span><strong>${escape(a.tokens)}<\u002Fstrong>tok<\u002Fspan>\n            <span><strong>${escape(a.cost)}<\u002Fstrong>cost<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"right\"><button class=\"expand-toggle\" type=\"button\" aria-expanded=\"false\"><span class=\"chev\"><\u002Fspan>Detail<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        ${renderExpandBody(expandInner)}\n      <\u002Farticle>`;\n  }\n\n  // Tier 3 — Ready-to-merge one-liner. Click expands inline to show commits + a Supervisor link; Merge stays as a direct action.\n  function renderCompactCompleted(a) {\n    const expandInner = `\n      ${renderEventsList(a, 4, \"Final commits\")}\n      <div class=\"expand-foot\">\n        <button class=\"expand-supervisor-link\" type=\"button\" data-task=\"${escape(a.task)}\"><i class=\"ic\" data-lucide=\"scan-search\"><\u002Fi>Open in Supervisor<\u002Fbutton>\n      <\u002Fdiv>`;\n    return `\n      <article class=\"agent-card completed compact\" tabindex=\"0\" data-task=\"${escape(a.task)}\">\n        <div class=\"compact-row\">\n          <span class=\"status-dot status-completed\"><\u002Fspan>\n          <div class=\"compact-name\">${escape(a.task)}<span class=\"compact-meta\">${a.checkpoint.current}/${a.checkpoint.total} · ${escape(a.cost)} · ${escape(relTime(a.events[0].ms))}<\u002Fspan><\u002Fdiv>\n          <span class=\"state-pill done\">Ready to merge<\u002Fspan>\n          <button class=\"expand-toggle\" type=\"button\" aria-expanded=\"false\"><span class=\"chev\"><\u002Fspan>Detail<\u002Fbutton>\n          <button class=\"mini-btn merge\" type=\"button\" data-merge=\"${escape(a.task)}\"><i class=\"ic\" data-lucide=\"git-merge\"><\u002Fi>Merge<\u002Fbutton>\n        <\u002Fdiv>\n        ${renderExpandBody(expandInner)}\n      <\u002Farticle>`;\n  }\n\n  function renderAgent(a) {\n    if (a.attention) return renderAttentionCard(a);\n    if (a.state === \"completed\") return renderCompactCompleted(a);\n    return renderWorkingCard(a);\n  }\n\n  function renderAll() {\n    // Group by tier so density stacks visually: attention → working → ready-to-merge\n    const tiers = [\n      { key: \"attention\", label: \"Needs you\",     items: AGENTS.filter(a => a.attention) },\n      { key: \"working\",   label: \"Working\",       items: AGENTS.filter(a => !a.attention && a.state === \"working\") },\n      { key: \"ready\",     label: \"Ready to merge\", items: AGENTS.filter(a => !a.attention && a.state === \"completed\") },\n    ];\n    const html = tiers\n      .filter(t => t.items.length)\n      .map(t => `\n        <div class=\"tier-head\" data-tier=\"${t.key}\">\n          <span><span class=\"count\">${t.items.length}<\u002Fspan> · ${escape(t.label)}<\u002Fspan>\n          <span class=\"rule\"><\u002Fspan>\n        <\u002Fdiv>\n        ${t.items.map(renderAgent).join(\"\")}\n      `).join(\"\");\n    document.getElementById(\"agents-grid\").innerHTML = html;\n\n    // Compute provider mix from active agents\n    const mix = {};\n    AGENTS.forEach(a => { mix[a.source] = (mix[a.source] || 0) + 1; });\n    const mixEl = document.getElementById(\"provider-mix\");\n    if (mixEl) {\n      mixEl.innerHTML = Object.entries(mix)\n        .sort((a, b) => b[1] - a[1])\n        .map(([name, n]) => `<span class=\"provider-chip\" data-provider=\"${escape(name)}\"><span class=\"dot\"><\u002Fspan><span class=\"n\">${n}<\u002Fspan>${escape(name)}<\u002Fspan>`)\n        .join(\"\");\n    }\n\n    // Wire up EVERY card to open its own drawer OR toggle expand depending on state.\n    document.querySelectorAll(\".agent-card\").forEach(el => {\n      const task = el.dataset.task;\n      const isAttention = el.classList.contains(\"attention\");\n      const activate = () => {\n        const agent = AGENTS.find(a => a.task === task);\n        if (!agent) return;\n        if (isAttention) {\n          openDrawer(agent);\n        } else {\n          el.classList.toggle(\"is-expanded\");\n        }\n      };\n      el.addEventListener(\"click\", e => {\n        if (e.target.closest(\".mini-btn\") || e.target.closest(\".sha-copy\") || e.target.closest(\".expand-supervisor-link\") || e.target.closest(\".expand-toggle\")) return;\n        activate();\n      });\n      el.addEventListener(\"keydown\", e => {\n        if (e.key === \"Enter\" || e.key === \" \") {\n          if (e.target.closest(\"button\")) return;\n          e.preventDefault();\n          activate();\n        }\n      });\n    });\n\n    if (window.lucide) lucide.createIcons();\n  }\n\n  // ----- Drawer behavior -----\n  // Track which agent is currently in the drawer (used for prev/next nav).\n  let drawerAgentTask = null;\n\n  // State-aware diagnosis copy for the drawer.\n  function diagnoseAgent(a) {\n    if (a.attention) {\n      return {\n        eyebrow: `Went Dark · ${a.source}`,\n        diagTitle: \"Went Dark — no fresh output for 4m\",\n        diagBody: \"Auth shim was replaced, but the login probe never executed. Agent went quiet right after writing the probe. Send to Supervisor first — it's the only red lane.\",\n        actionLabel: \"Ask Supervisor Agent\",\n        actionIcon: \"scan-search\",\n        silentChip: \"4m\",\n      };\n    }\n    if (a.state === \"completed\") {\n      return {\n        eyebrow: `Ready to merge · ${a.source}`,\n        diagTitle: `All checkpoints clean (${a.checkpoint.current}/${a.checkpoint.total})`,\n        diagBody: a.checkpoint.label + \" Safe to merge or queue for review.\",\n        actionLabel: \"Merge to main\",\n        actionIcon: \"git-merge\",\n      };\n    }\n    // working\n    const lastTick = relTime(a.events[0].ms);\n    return {\n      eyebrow: `Working · ${a.source}`,\n      diagTitle: `Checkpoint ${a.checkpoint.current}/${a.checkpoint.total} — last pulse ${lastTick}`,\n      diagBody: a.checkpoint.label,\n      actionLabel: \"Open agent thread\",\n      actionIcon: \"message-square-more\",\n    };\n  }\n\n  function renderDrawerFor(a) {\n    const drawer = document.getElementById(\"supervisor-drawer\");\n    const drawerState = a.attention ? \"attention\" : a.state;\n    drawer.dataset.state = drawerState;\n    drawerAgentTask = a.task;\n\n    const diag = diagnoseAgent(a);\n\n    document.getElementById(\"drawer-eyebrow\").innerHTML = `<span class=\"dot\"><\u002Fspan>${escape(diag.eyebrow)}`;\n    document.getElementById(\"drawer-title\").textContent = a.task;\n    document.getElementById(\"drawer-goal\").textContent = a.goal;\n\n    const metaBits = [\n      `<span><strong>${a.checkpoint.current}/${a.checkpoint.total}<\u002Fstrong>checkpoints<\u002Fspan>`,\n      `<span><strong>${escape(a.tokens)}<\u002Fstrong>tokens<\u002Fspan>`,\n      `<span><strong>${escape(a.cost)}<\u002Fstrong>cost<\u002Fspan>`,\n    ];\n    if (diag.silentChip) metaBits.push(`<span><strong>${diag.silentChip}<\u002Fstrong>silent<\u002Fspan>`);\n    document.getElementById(\"drawer-meta\").innerHTML = metaBits.join(\"\");\n\n    document.getElementById(\"drawer-diag\").innerHTML = `<strong>${escape(diag.diagTitle)}<\u002Fstrong><span>${escape(diag.diagBody)}<\u002Fspan>`;\n\n    const actionBtn = document.getElementById(\"drawer-action\");\n    actionBtn.innerHTML = `<i class=\"ic\" data-lucide=\"${diag.actionIcon}\"><\u002Fi><span>${escape(diag.actionLabel)}<\u002Fspan>`;\n    actionBtn.dataset.task = a.task;\n\n    const timelineHtml = a.events.slice(0, 5).map((ev, i) => {\n      const tagHtml = ev.tag ? `<span class=\"tag\">${escape(ev.tag)}<\u002Fspan>` : \"\";\n      const shaHtml = ev.sha ? `<button class=\"sha-copy\" data-sha=\"${escape(ev.sha)}\" type=\"button\" title=\"Copy ${escape(ev.sha)}\" aria-label=\"Copy commit ${escape(ev.sha)}\"><i class=\"ic\" data-lucide=\"git-commit-horizontal\"><\u002Fi><\u002Fbutton>` : \"\";\n      return `\n        <div class=\"act ${ev.kind} ${i === 0 ? \"lead\" : \"\"}\">\n          <time>${escape(relTime(ev.ms))}<\u002Ftime>\n          <span class=\"ic\">${iconFor(ev.kind) ? `<i data-lucide=\"${iconFor(ev.kind)}\"><\u002Fi>` : ''}<\u002Fspan>\n          <div class=\"txt\">${tagHtml}${escape(ev.text)}<\u002Fdiv>\n          ${shaHtml}\n        <\u002Fdiv>`;\n    }).join(\"\");\n    document.getElementById(\"drawer-timeline\").innerHTML = timelineHtml;\n\n    // Mark the active card\n    document.querySelectorAll(\".agent-card.is-active\").forEach(c => c.classList.remove(\"is-active\"));\n    const activeCard = document.querySelector(`.agent-card[data-task=\"${cssEscape(a.task)}\"]`);\n    if (activeCard) activeCard.classList.add(\"is-active\");\n\n    if (window.lucide) lucide.createIcons();\n  }\n\n  function cssEscape(s) {\n    return String(s).replace(/([\"\\\\\\]])/g, \"\\\\$1\");\n  }\n\n  // Visible order, for prev/next nav.\n  function visibleAgentOrder() {\n    return [\n      ...AGENTS.filter(a => a.attention),\n      ...AGENTS.filter(a => !a.attention && a.state === \"working\"),\n      ...AGENTS.filter(a => !a.attention && a.state === \"completed\"),\n    ];\n  }\n\n  function stepDrawer(delta) {\n    const order = visibleAgentOrder();\n    if (!order.length) return;\n    let idx = order.findIndex(a => a.task === drawerAgentTask);\n    if (idx < 0) idx = 0;\n    idx = (idx + delta + order.length) % order.length;\n    renderDrawerFor(order[idx]);\n  }\n\n  function openDrawer(agent) {\n    // Default to the attention agent if called with no arg (notifications, topbar shortcut)\n    if (!agent) agent = AGENTS.find(a => a.attention) || AGENTS[0];\n    renderDrawerFor(agent);\n    document.getElementById(\"supervisor-drawer\").classList.add(\"open\");\n    document.getElementById(\"supervisor-drawer\").setAttribute(\"aria-hidden\", \"false\");\n    document.getElementById(\"drawer-backdrop\").classList.add(\"open\");\n  }\n  function closeDrawer() {\n    document.getElementById(\"supervisor-drawer\").classList.remove(\"open\");\n    document.getElementById(\"supervisor-drawer\").setAttribute(\"aria-hidden\", \"true\");\n    document.getElementById(\"drawer-backdrop\").classList.remove(\"open\");\n    document.querySelectorAll(\".agent-card.is-active\").forEach(c => c.classList.remove(\"is-active\"));\n    drawerAgentTask = null;\n  }\n  function isDrawerOpen() {\n    return document.getElementById(\"supervisor-drawer\").classList.contains(\"open\");\n  }\n  document.addEventListener(\"DOMContentLoaded\", () => {\n    renderAll();\n    renderOpsSpark();\n    document.getElementById(\"open-supervisor\")?.addEventListener(\"click\", () => openDrawer());\n    document.getElementById(\"drawer-close\").addEventListener(\"click\", closeDrawer);\n    document.getElementById(\"drawer-backdrop\").addEventListener(\"click\", closeDrawer);\n    document.getElementById(\"drawer-prev\")?.addEventListener(\"click\", () => stepDrawer(-1));\n    document.getElementById(\"drawer-next\")?.addEventListener(\"click\", () => stepDrawer(+1));\n    document.addEventListener(\"keydown\", e => {\n      if (e.key === \"Escape\") {\n        if (isDrawerOpen()) {\n          closeDrawer();\n        } else {\n          document.querySelectorAll(\".agent-card.is-expanded\").forEach(c => c.classList.remove(\"is-expanded\"));\n        }\n      }\n      if (isDrawerOpen()) {\n        if (e.key === \"ArrowLeft\" || e.key === \"ArrowUp\") { e.preventDefault(); stepDrawer(-1); }\n        if (e.key === \"ArrowRight\" || e.key === \"ArrowDown\") { e.preventDefault(); stepDrawer(+1); }\n      }\n    });\n    initNotifications();\n    initThreshold();\n    initFilters();\n\n    // Global click delegate\n    document.body.addEventListener(\"click\", e => {\n      // Click-to-copy commit shas\n      const pill = e.target.closest(\".sha-copy\");\n      if (pill) {\n        e.stopPropagation();\n        const sha = pill.dataset.sha;\n        if (sha) {\n          navigator.clipboard?.writeText(sha);\n          showToast(`Copied ${sha}`);\n        }\n        return;\n      }\n      // Merge action — direct, no drawer\n      const mergeBtn = e.target.closest(\".mini-btn.merge\");\n      if (mergeBtn) {\n        e.stopPropagation();\n        handleMerge(mergeBtn);\n        return;\n      }\n      // The drawer's own primary action — handle by state\n      const drawerActionBtn = e.target.closest(\"#drawer-action\");\n      if (drawerActionBtn) {\n        e.stopPropagation();\n        const task = drawerActionBtn.dataset.task;\n        const agent = AGENTS.find(a => a.task === task);\n        if (!agent) return;\n        if (agent.state === \"completed\") {\n          // Find the card's merge button and trigger it\n          const card = document.querySelector(`.agent-card[data-task=\"${cssEscape(task)}\"] .mini-btn.merge`);\n          if (card) {\n            closeDrawer();\n            handleMerge(card);\n          }\n        } else {\n          showToast(`Routing ${task} to Supervisor…`);\n        }\n        return;\n      }\n      // Expand toggle button on working/compact cards\n      const expandToggle = e.target.closest(\".expand-toggle\");\n      if (expandToggle) {\n        e.stopPropagation();\n        const card = expandToggle.closest(\".agent-card\");\n        if (card) {\n          card.classList.toggle(\"is-expanded\");\n          expandToggle.setAttribute(\"aria-expanded\", card.classList.contains(\"is-expanded\") ? \"true\" : \"false\");\n        }\n        return;\n      }\n      // \"Open in Supervisor\" link inside expand body — opens drawer for that card\n      const expandLink = e.target.closest(\".expand-supervisor-link\");\n      if (expandLink) {\n        e.stopPropagation();\n        const task = expandLink.dataset.task;\n        const agent = AGENTS.find(a => a.task === task);\n        openDrawer(agent);\n        return;\n      }\n      // Card-level Ask Supervisor (any non-merge mini-btn on a card) — open drawer for that card\n      const supervisorBtn = e.target.closest(\".agent-card .mini-btn\");\n      if (supervisorBtn) {\n        e.stopPropagation();\n        const card = supervisorBtn.closest(\".agent-card\");\n        const task = card?.dataset.task;\n        const agent = AGENTS.find(a => a.task === task);\n        openDrawer(agent);\n        return;\n      }\n    });\n  });\n\n  // ----- 24h fleet-health sparkline -----\n  // 24 hourly samples of \"healthy share\" (0–1). Dip ~hour 18 when Auth went dark.\n  const HEALTH_24H = [\n    0.95, 0.95, 0.93, 0.95, 0.93, 0.90, 0.88, 0.90,\n    0.92, 0.93, 0.95, 0.95, 0.93, 0.90, 0.87, 0.83,\n    0.78, 0.65, 0.55, 0.70, 0.80, 0.83, 0.83, 0.83,\n  ];\n  function renderOpsSpark() {\n    const svg = document.getElementById(\"ops-spark\");\n    if (!svg) return;\n    const W = 240, H = 24;\n    const pad = 1;\n    const n = HEALTH_24H.length;\n    const step = (W - pad * 2) / (n - 1);\n    const pts = HEALTH_24H.map((v, i) => [pad + i * step, pad + (1 - v) * (H - pad * 2)]);\n    const line = pts.map(([x, y], i) => (i === 0 ? \"M\" : \"L\") + x.toFixed(1) + \",\" + y.toFixed(1)).join(\" \");\n    const area = line + ` L${pts[pts.length - 1][0].toFixed(1)},${H} L${pad},${H} Z`;\n    const last = pts[pts.length - 1];\n    const minIdx = HEALTH_24H.indexOf(Math.min(...HEALTH_24H));\n    const minPt = pts[minIdx];\n    svg.innerHTML = `\n      <path class=\"area\" d=\"${area}\" />\n      <path class=\"line\" d=\"${line}\" />\n      <circle class=\"dip\" cx=\"${minPt[0].toFixed(1)}\" cy=\"${minPt[1].toFixed(1)}\" r=\"2.2\" />\n      <circle class=\"dot\" cx=\"${last[0].toFixed(1)}\" cy=\"${last[1].toFixed(1)}\" r=\"2.4\" />\n    `;\n  }\n\n  // ----- Merge -----\n  function handleMerge(btn) {\n    const task = btn.dataset.merge;\n    const card = btn.closest(\".agent-card\");\n    btn.disabled = true;\n    btn.innerHTML = `<i class=\"ic\" data-lucide=\"loader\"><\u002Fi>Merging…`;\n    if (window.lucide) lucide.createIcons();\n    setTimeout(() => {\n      if (card) {\n        card.classList.add(\"merged\");\n      }\n      btn.innerHTML = `<i class=\"ic\" data-lucide=\"check\"><\u002Fi>Merged`;\n      if (window.lucide) lucide.createIcons();\n      const fakeSha = Math.random().toString(16).slice(2, 9);\n      showToast(`Merged ${task} → main (${fakeSha})`);\n    }, 700);\n  }\n\n  // ----- Notifications -----\n  function initNotifications() {\n    const btn = document.getElementById(\"toggle-notifications\");\n    const stateEl = btn.querySelector(\".alerts-state\");\n    const attn = AGENTS.find(a => a.attention);\n    const setState = (on) => {\n      btn.dataset.state = on ? \"on\" : \"off\";\n      btn.setAttribute(\"aria-pressed\", on ? \"true\" : \"false\");\n      if (stateEl) stateEl.textContent = on ? \"On\" : \"Off\";\n    };\n    if (localStorage.getItem(\"ct-notif\") === \"on\" && Notification?.permission === \"granted\") {\n      setState(true);\n    }\n    btn.addEventListener(\"click\", async () => {\n      if (btn.dataset.state === \"on\") {\n        setState(false);\n        localStorage.setItem(\"ct-notif\", \"off\");\n        showToast(\"Notifications off\");\n        return;\n      }\n      if (!(\"Notification\" in window)) {\n        showToast(\"Notifications not supported\");\n        return;\n      }\n      let perm = Notification.permission;\n      if (perm === \"default\") perm = await Notification.requestPermission();\n      if (perm !== \"granted\") {\n        showToast(\"Notifications blocked by browser\");\n        return;\n      }\n      setState(true);\n      localStorage.setItem(\"ct-notif\", \"on\");\n      showToast(\"Notifications on — sending sample\");\n      if (attn) setTimeout(() => fireAlert(attn), 600);\n    });\n  }\n  // ----- Triage filters (dim non-matching) -----\n  function initFilters() {\n    const chips = document.querySelectorAll(\".triage-chip\");\n    chips.forEach(chip => {\n      chip.addEventListener(\"click\", () => {\n        chips.forEach(c => c.classList.remove(\"active\"));\n        chip.classList.add(\"active\");\n        const filter = chip.dataset.filter || \"all\";\n        if (filter === \"all\") document.body.removeAttribute(\"data-filter\");\n        else document.body.setAttribute(\"data-filter\", filter);\n      });\n    });\n  }\n\n  // ----- Threshold (global cost alert) -----\n  function initThreshold() {\n    const btn = document.getElementById(\"threshold-chip\");\n    const amountEl = document.getElementById(\"threshold-amount\");\n    let value = parseFloat(localStorage.getItem(\"ct-threshold\") || \"2\");\n    const render = () => { amountEl.textContent = value.toFixed(2); };\n    render();\n    btn.addEventListener(\"click\", (e) => {\n      e.stopPropagation();\n      openThresholdEditor(btn, value, (v) => {\n        value = v;\n        localStorage.setItem(\"ct-threshold\", String(v));\n        render();\n        showToast(`Alert threshold: $${v.toFixed(2)}`);\n      });\n    });\n  }\n  function openThresholdEditor(anchor, current, onSave) {\n    document.querySelectorAll(\".cost-popover\").forEach(p => p.remove());\n    const pop = document.createElement(\"div\");\n    pop.className = \"cost-popover\";\n    pop.innerHTML = `\n      <div class=\"cp-head\">Notify when any agent's cost passes<\u002Fdiv>\n      <div class=\"cp-input\">\n        <span class=\"cp-dollar\">$<\u002Fspan>\n        <input type=\"number\" step=\"0.25\" min=\"0.25\" value=\"${current.toFixed(2)}\" aria-label=\"Threshold in dollars\" />\n      <\u002Fdiv>\n      <div class=\"cp-presets\">\n        <button type=\"button\" data-v=\"0.5\">$0.50<\u002Fbutton>\n        <button type=\"button\" data-v=\"1\">$1<\u002Fbutton>\n        <button type=\"button\" data-v=\"2\">$2<\u002Fbutton>\n        <button type=\"button\" data-v=\"5\">$5<\u002Fbutton>\n        <button type=\"button\" data-v=\"10\">$10<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"cp-actions\">\n        <button type=\"button\" class=\"cp-cancel\">Cancel<\u002Fbutton>\n        <button type=\"button\" class=\"cp-save primary\">Save<\u002Fbutton>\n      <\u002Fdiv>\n    `;\n    document.body.appendChild(pop);\n    const rect = anchor.getBoundingClientRect();\n    pop.style.top = (rect.bottom + window.scrollY + 8) + \"px\";\n    pop.style.left = Math.max(8, rect.right + window.scrollX - pop.offsetWidth) + \"px\";\n    const input = pop.querySelector(\"input\");\n    input.focus();\n    input.select();\n    const close = () => pop.remove();\n    const save = () => {\n      const v = parseFloat(input.value);\n      if (v > 0) onSave(v);\n      close();\n    };\n    pop.querySelector(\".cp-cancel\").addEventListener(\"click\", close);\n    pop.querySelector(\".cp-save\").addEventListener(\"click\", save);\n    pop.querySelectorAll(\".cp-presets button\").forEach(b => {\n      b.addEventListener(\"click\", () => { input.value = b.dataset.v; input.focus(); });\n    });\n    input.addEventListener(\"keydown\", e => {\n      if (e.key === \"Enter\") save();\n      if (e.key === \"Escape\") close();\n    });\n    setTimeout(() => {\n      document.addEventListener(\"click\", function once(e) {\n        if (!pop.contains(e.target) && !anchor.contains(e.target)) {\n          close();\n          document.removeEventListener(\"click\", once);\n        }\n      });\n    }, 0);\n  }\n\n  function fireAlert(agent) {\n    if (!(\"Notification\" in window) || Notification.permission !== \"granted\") return;\n    try {\n      const n = new Notification(`⚠ ${agent.task} went dark`, {\n        body: `${agent.source} — no fresh output for 4m. Tap to open Supervisor.`,\n        tag: \"ct-\" + agent.task,\n      });\n      n.onclick = () => { window.focus(); openDrawer(); n.close(); };\n    } catch (e) {}\n  }\n\n  function showToast(msg) {\n    let t = document.getElementById(\"toast\");\n    if (!t) {\n      t = document.createElement(\"div\");\n      t.id = \"toast\";\n      t.className = \"toast\";\n      document.body.appendChild(t);\n    }\n    t.textContent = msg;\n    t.classList.add(\"show\");\n    clearTimeout(t._timeout);\n    t._timeout = setTimeout(() => t.classList.remove(\"show\"), 1600);\n  }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
