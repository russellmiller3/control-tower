  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

he content —\n     just dashed rules and disciplined whitespace. ONE color (a\n     Tufte red) reserved for the agent that actually needs you.\n     Sparklines as small multiples. ADHD-friendly hierarchy: one\n     focal \"lede\" up top, calm roster below, day at a glance last.\n     No peripheral animation. Vim-style keybindings.                */\n\n  :root {\n    --mono: \"Cascadia Mono\", \"Cascadia Code\", Consolas, ui-monospace, monospace;\n\n    /* light-theme terminal palette */\n    --bg:        #f6f1e2;\n    --bg-soft:   #efe8d2;\n    --bg-tab:    #e6dfc9;\n    --bg-bar:    #ddd5bc;\n    --ink:       #1c1b18;\n    --ink-2:     #2c2a26;\n    --muted:     #807866;\n    --muted-2:   #b1a98e;\n    --rule:      #c8bfa6;\n    --rule-soft: #d8d0b8;\n    --red:       #a3331e;     /* Tufte red — only color for \"wrong\" */\n    --red-soft:  #ecd4c8;\n    --olive:     #5d6a2a;     /* used once, for \"done\" */\n  }\n\n  * { box-sizing: border-box; }\n  html, body { background: #2e2a20; }   /* desktop chrome behind window */\n\n  body {\n    margin: 0;\n    min-height: 100vh;\n    color: var(--ink);\n    font-family: var(--mono);\n    font-size: 14px;\n    line-height: 1.5;\n    -webkit-font-smoothing: antialiased;\n    font-feature-settings: \"calt\" 0, \"liga\" 0;\n    padding: 8px;\n  }\n  ::selection { background: var(--ink); color: var(--bg); }\n\n  button, input { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }\n\n  /* ─── Window chrome (Windows Terminal, light theme) ──────────── */\n  .window {\n    max-width: 1100px;\n    margin: 0 auto;\n    background: var(--bg);\n    border: 1px solid #1a1610;\n    border-radius: 8px 8px 0 0;\n    overflow: hidden;\n  }\n  .titlebar {\n    display: grid;\n    grid-template-columns: auto auto 1fr auto auto auto;\n    align-items: stretch;\n    height: 32px;\n    background: var(--bg-bar);\n    color: var(--ink-2);\n    border-bottom: 1px solid var(--rule);\n    user-select: none;\n  }\n  .tb-ic {\n    width: 36px;\n    display: inline-flex; align-items: center; justify-content: center;\n    color: var(--muted);\n  }\n  .tb-ic:hover { background: var(--bg-soft); color: var(--ink); }\n  .tb-tabs { display: inline-flex; align-items: stretch; padding-left: 4px; }\n  .tab {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 0 14px 0 12px;\n    color: var(--muted);\n    border-radius: 6px 6px 0 0;\n    margin-top: 4px;\n    height: calc(100% - 4px);\n    font-size: 13px;\n  }\n  .tab.active {\n    color: var(--ink);\n    background: var(--bg);\n  }\n  .tab .x {\n    font-size: 11px;\n    color: var(--muted-2);\n    padding: 1px 4px;\n    border-radius: 3px;\n    margin-left: 2px;\n  }\n  .tab.active .x:hover { color: var(--ink); background: var(--bg-soft); }\n  .tb-ic.win-min, .tb-ic.win-max, .tb-ic.win-close {\n    width: 46px; height: 32px;\n    font-size: 11px;\n    color: var(--ink-2);\n  }\n  .tb-ic.win-close:hover { background: var(--red); color: #fff; }\n  .tb-ic svg { width: 11px; height: 11px; fill: currentColor; }\n\n  /* ─── Screen ───────────────────────────────────────────────── */\n  .screen {\n    padding: 18px 32px 14px;\n    background: var(--bg);\n    color: var(--ink);\n    min-height: calc(100vh - 60px);\n  }\n\n  /* PowerShell prompt */\n  .prompt {\n    color: var(--muted);\n    white-space: pre-wrap;\n    margin-bottom: 22px;\n  }\n  .prompt .ps     { color: var(--olive); }\n  .prompt .path   { color: var(--ink-2); }\n  .prompt .branch { color: var(--muted); }\n  .prompt .gt     { color: var(--olive); }\n  .prompt .cmd    { color: var(--ink); }\n  .prompt .ts     { float: right; color: var(--muted-2); }\n\n  /* ─── Section label (small caps in mono = just CAPS) ─────── */\n  .sec {\n    color: var(--muted);\n    font-size: inherit;\n    margin: 0 0 10px;\n    text-transform: uppercase;\n    font-weight: 400;\n  }\n  .rule {\n    display: block;\n    color: var(--rule);\n    line-height: 1;\n    margin: 30px 0 14px;\n    user-select: none;\n    overflow: hidden;\n    white-space: nowrap;\n    letter-spacing: 0;\n  }\n  .rule::before {\n    content: \"──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────\";\n  }\n\n  /* ─── THE ONE THING — focal lede ────────────────────────────── */\n  .focal {\n    padding: 4px 0 6px;\n  }\n  .focal .lede {\n    line-height: 1.4;\n    font-weight: 700;\n    margin: 0 0 1em;\n    color: var(--ink);\n  }\n  .focal .lede .agent {\n    background: var(--red);\n    color: var(--bg);\n    font-weight: 700;\n    padding: 0 0.5ch;\n  }\n  .focal .lede .when { color: var(--muted); }\n\n  /* Pieces-completed marker — big version for focal */\n  .focal .pieces-block {\n    margin: 14px 0 18px;\n    display: flex;\n    align-items: baseline;\n    gap: 20px;\n    flex-wrap: wrap;\n  }\n  .focal .pieces-big {\n    font-family: var(--mono);\n    font-weight: 700;\n    color: var(--red);\n    white-space: pre;\n  }\n  .focal .pieces-big .empty { color: var(--rule); }\n  .focal .pieces-caption {\n    color: var(--ink-2);\n    line-height: 1.4;\n  }\n  .focal .pieces-caption .lbl { color: var(--ink); font-weight: 700; }\n  .focal .pieces-caption .note { display: block; color: var(--muted); margin-top: 0.2em; }\n\n  .focal .body {\n    color: var(--ink-2);\n    line-height: 1.55;\n    max-width: 70ch;\n    margin: 0 0 16px;\n  }\n  .focal .body .quote {\n    color: var(--ink);\n  }\n  .focal .body .quote::before { content: \"\\201C\"; }\n  .focal .body .quote::after { content: \"\\201D\"; }\n\n  .focal .actions {\n    display: flex; gap: 24px; flex-wrap: wrap;\n    margin: 6px 0 12px;\n  }\n  .focal .actions .bk {\n    color: var(--ink-2);\n    display: inline-flex; gap: 8px; align-items: baseline;\n  }\n  .focal .actions .bk:hover { color: var(--ink); }\n  .focal .actions .bk .k {\n    color: var(--red);\n    font-weight: 700;\n  }\n  .focal .actions .bk.go .k { color: var(--olive); }\n  .focal .actions .bk .lbl { border-bottom: 1px solid var(--rule); padding-bottom: 1px; }\n  .focal .actions .bk:hover .lbl { border-bottom-color: var(--ink); }\n\n  .focal .meta {\n    color: var(--muted);\n  }\n  .focal .meta b { color: var(--ink-2); font-weight: 700; }\n\n  /* ─── Roster — checkpoint-marker + last-update table ─────── */\n  .roster {\n    margin: 4px 0 0;\n  }\n  .roster .head, .roster .row {\n    display: grid;\n    grid-template-columns:\n      minmax(0, 1fr)    /* name */\n      12ch              /* pieces marker + count */\n      minmax(0, 2fr)    /* last update text */\n      6ch               /* last time */\n      8ch               /* cost */\n      11ch              /* flag */\n      ;\n    gap: 0 16px;\n    align-items: baseline;\n    padding: 6px 0;\n  }\n  .roster .head {\n    color: var(--muted);\n    border-bottom: 1px solid var(--rule);\n    padding-bottom: 5px;\n    margin-bottom: 4px;\n    text-transform: uppercase;\n  }\n  .roster .row {\n    border-bottom: 1px dotted var(--rule-soft);\n    cursor: pointer;\n  }\n  .roster .row:last-of-type { border-bottom: 0; }\n  .roster .row:hover {\n    background: var(--bg-soft);\n    margin: 0 -8px;\n    padding-left: 8px;\n    padding-right: 8px;\n  }\n\n  .roster .name {\n    color: var(--ink);\n    white-space: nowrap;\n    overflow: hidden;\n    text-overflow: ellipsis;\n  }\n  .roster .name .badge {\n    color: var(--olive);\n    margin-left: 8px;\n  }\n\n  /* pieces-completed marker, row-sized */\n  .roster .pieces {\n    color: var(--olive);\n    font-family: var(--mono);\n    white-space: nowrap;\n  }\n  .roster .pieces .empty { color: var(--rule); }\n  .roster .pieces .count { color: var(--ink-2); margin-left: 6px; font-variant-numeric: tabular-nums; letter-spacing: 0; }\n  .roster .row.attention .pieces { color: var(--red); }\n\n  /* last update text — quiet, single line */\n  .roster .last-update {\n    color: var(--ink-2);\n    white-space: nowrap;\n    overflow: hidden;\n    text-overflow: ellipsis;\n  }\n  .roster .last-update .when {\n    color: var(--muted);\n    margin-right: 8px;\n    font-variant-numeric: tabular-nums;\n  }\n  .roster .last-update .glyph {\n    color: var(--muted);\n    margin-right: 4px;\n  }\n  .roster .last-update .glyph.ok { color: var(--olive); }\n  .roster .last-update .glyph.err { color: var(--red); }\n\n  .roster .col {\n    color: var(--ink-2);\n    text-align: right;\n    font-variant-numeric: tabular-nums;\n  }\n  .roster .col.dim { color: var(--muted); }\n  .roster .flag {\n    color: var(--muted);\n    text-align: right;\n  }\n  .roster .row.ready .flag { color: var(--olive); }\n\n  /* ─── The day, in three lines ───────────────────────────────── */\n  .glance .item {\n    display: grid;\n    grid-template-columns: 11ch 1fr 22ch;\n    gap: 16px;\n    align-items: baseline;\n    padding: 6px 0 2px;\n  }\n  .glance .item + .item { margin-top: 12px; }\n  .glance .item .k {\n    color: var(--muted);\n    text-transform: uppercase;\n  }\n  .glance .item .spark {\n    line-height: 1;\n    letter-spacing: 0;\n    color: var(--ink-2);\n    white-space: pre;\n  }\n  .glance .item .spark .dip { color: var(--red); }\n  .glance .item .spark .now { color: var(--ink); font-weight: 700; }\n  .glance .item .v {\n    text-align: left;\n    color: var(--ink);\n  }\n  .glance .item .v .num { color: var(--ink); }\n  .glance .item .v .delta { color: var(--muted); margin-left: 6px; }\n  .glance .item .v .delta.up { color: var(--olive); }\n  .glance .item .v .delta.down { color: var(--red); }\n  .glance .item .note {\n    grid-column: 2 / 4;\n    color: var(--muted);\n    margin-top: 2px;\n  }\n\n  /* ─── Inline detail (click a row) ───────────────────────────── */\n  .detail {\n    padding: 12px 14px;\n    margin: 4px 0 8px;\n    border-left: 2px solid var(--ink);\n    background: var(--bg-soft);\n    color: var(--ink-2);\n    line-height: 1.5;\n  }\n  .detail.attention { border-left-color: var(- ));\n    if (s < 5) return \"just now\";\n    if (s < 60) return s + \"s ago\";\n    if (s < 3600) { const m = s / 60; return (m < 10 ? m.toFixed(1).replace(/\\.0$/, \"\") : Math.floor(m)) + \"m ago\"; }\n    return Math.floor(s / 3600) + \"h ago\";\n  }\n  function relTimeShort(ms) {\n    const s = Math.max(0, Math.floor((NOW - ms) / 1000));\n    if (s < 60) return s + \"s\";\n    if (s < 3600) { const m = s / 60; return (m < 10 ? m.toFixed(1).replace(/\\.0$/, \"\") : Math.floor(m)) + \"m\"; }\n    return Math.floor(s / 3600) + \"h\";\n  }\n  function sparkInline(values, opts = {}) {\n    const dipThreshold = opts.dipThreshold ?? 0.15;\n    return values.map((v, i) => {\n      if (v <= 0.001) return `<span class=\"void\">${SPARK[0]}<\u002Fspan>`;\n      const idx = Math.max(0, Math.min(7, Math.round(v * 7)));\n      const ch = SPARK[idx];\n      if (v < dipThreshold) return `<span class=\"dark\">${ch}<\u002Fspan>`;\n      if (i === values.length - 1 && opts.markLast) return `<span class=\"now\">${ch}<\u002Fspan>`;\n      return ch;\n    }).join(\"\");\n  }\n  /* pieces-completed marker — ● for done, ○ for pending */\n  function piecesMarker(current, total) {\n    const done = Array(current).fill(\"●\").join(\" \");\n    const pendCount = total - current;\n    const pend = pendCount > 0\n      ? '<span class=\"empty\">' + Array(pendCount).fill(\"○\").join(\" \") + '<\u002Fspan>'\n      : \"\";\n    return done + (current > 0 && pendCount > 0 ? \" \" : \"\") + pend;\n  }\n  function eventGlyph(ev) {\n    if (ev.kind === \"problem\") return `<span class=\"glyph err\">!<\u002Fspan>`;\n    if (ev.kind === \"checkpoint\" || ev.kind === \"milestone\") return `<span class=\"glyph ok\">✓<\u002Fspan>`;\n    return `<span class=\"glyph\">·<\u002Fspan>`;\n  }\n\n  function cssEsc(s) { return String(s).replace(/([\"\\\\])/g, \"\\\\$1\"); }\n\n  /* ─── Focal ────────────────────────────────────────────────── */\n  function renderFocal() {\n    const host = document.getElementById(\"focal\");\n    const attn = AGENTS.find(a => a.attention);\n    if (attn) {\n      const remaining = attn.checkpoint.total - attn.checkpoint.current;\n      host.innerHTML = `\n        <p class=\"lede\"><span class=\"agent\">${esc(attn.task)}<\u002Fspan> went dark <span class=\"when\">${esc(relTime(attn.events[0].ms))}<\u002Fspan>, mid-task.<\u002Fp>\n        <div class=\"pieces-block\">\n          <div class=\"pieces-big\">${piecesMarker(attn.checkpoint.current, attn.checkpoint.total)}<\u002Fdiv>\n          <div class=\"pieces-caption\">\n            <span class=\"lbl\">${attn.checkpoint.current} of ${attn.checkpoint.total} checkpoints<\u002Fspan> done\n            <span class=\"note\">Stopped at checkpoint ${attn.checkpoint.current} — ${remaining} remaining, including the login proof.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"body\"><span class=\"quote\">${esc(attn.diag)}<\u002Fspan> Of the six agents on <b>feature/tighten-card-density<\u002Fb>, this is the only one waiting on you — everything else is on schedule.<\u002Fp>\n        <div class=\"actions\">\n          <button class=\"bk\" data-act=\"supervise\" data-task=\"${esc(attn.task)}\"><span class=\"k\">[s]<\u002Fspan><span class=\"lbl\">Open in Supervisor<\u002Fspan><\u002Fbutton>\n          <button class=\"bk go\" data-act=\"dismiss\" data-task=\"${esc(attn.task)}\"><span class=\"k\">[.]<\u002Fspan><span class=\"lbl\">Mark as handled<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"meta\">${esc(attn.source)} · ${fmtTokens(attn.tokens)} tok · <b>${fmtCost(attn.cost)}<\u002Fb> of $${attn.costCeiling.toFixed(2)} budget · silent <b>${esc(attn.silent)}<\u002Fb><\u002Fdiv>`;\n      document.getElementById(\"mode\").textContent = \"ATTENTION\";\n      document.getElementById(\"mode\").className = \"mode attn\";\n    } else {\n      host.innerHTML = `\n        <p class=\"lede\">Nothing needs you. <span class=\"when\">All ${AGENTS.length} agents are on track.<\u002Fspan><\u002Fp>\n        <p class=\"body\">No agents have gone dark. Cost is under threshold. Check back when something changes — or read the roster below.<\u002Fp>`;\n      document.getElementById(\"mode\").textContent = \"NORMAL\";\n      document.getElementById(\"mode\").className = \"mode\";\n    }\n  }\n\n  /* ─── Roster ──────────────────────────────────────────────── */\n  function renderRoster() {\n    const host = document.getElementById(\"roster\");\n    const ordered = [\n      ...AGENTS.filter(a => !a.attention && a.state === \"working\"),\n      ...AGENTS.filter(a => !a.attention && a.state === \"completed\"),\n    ];\n    const head = `\n      <div class=\"head\">\n        <div>Agent<\u002Fdiv>\n        <div>Checkpoints<\u002Fdiv>\n        <div>Last update<\u002Fdiv>\n        <div style=\"text-align:right\">When<\u002Fdiv>\n        <div style=\"text-align:right\">Cost<\u002Fdiv>\n        <div style=\"text-align:right\"><\u002Fdiv>\n      <\u002Fdiv>`;\n    const rows = ordered.map(a => {\n      const rowCls = a.state === \"completed\" ? \"ready\" : \"working\";\n      const flag = a.state === \"completed\" ? \"ready to merge\" : \"\";\n      const ev = a.events[0];\n      const lastMs = ev?.ms || NOW;\n      const lastText = ev ? ev.text : \"\";\n      const glyph = ev ? eventGlyph(ev) : \"\";\n      return `\n        <div class=\"row ${rowCls}\" data-task=\"${esc(a.task)}\">\n          <div class=\"name\">${esc(a.task)}${a.state === \"completed\" ? `<span class=\"badge\">✓ done<\u002Fspan>` : \"\"}<\u002Fdiv>\n          <div class=\"pieces\">${piecesMarker(a.checkpoint.current, a.checkpoint.total)} <span class=\"count\">${a.checkpoint.current}/${a.checkpoint.total}<\u002Fspan><\u002Fdiv>\n          <div class=\"last-update\">${glyph}${esc(lastText)}<\u002Fdiv>\n          <div class=\"col\">${esc(relTimeShort(lastMs))}<\u002Fdiv>\n          <div class=\"col\">${fmtCost(a.cost)}<\u002Fdiv>\n          <div class=\"flag\">${flag}<\u002Fdiv>\n        <\u002Fdiv>`;\n    }).join(\"\");\n    host.innerHTML = head + rows;\n  }\n\n  /* ─── Glance ──────────────────────────────────────────────── */\n  function renderGlance() {\n    const host = document.getElementById(\"glance\");\n    const minH = Math.min(...HEALTH_24H);\n    const dipIdx = HEALTH_24H.indexOf(minH);\n    const lastIdxH = HEALTH_24H.length - 1;\n    const healthSpark = HEALTH_24H.map((v, i) => {\n      const idx = Math.max(0, Math.min(7, Math.round(v * 7)));\n      const ch = SPARK[idx];\n      if (i === dipIdx) return `<span class=\"dip\">${ch}<\u002Fspan>`;\n      if (i === lastIdxH) return `<span class=\"now\">${ch}<\u002Fspan>`;\n      return ch;\n    }).join(\"\");\n\n    const maxC = Math.max(...COST_24H);\n    const costSpark = COST_24H.map((v, i) => {\n      const idx = Math.max(0, Math.min(7, Math.round((v / maxC) * 7)));\n      const ch = SPARK[idx];\n      if (i === COST_24H.length - 1) return `<span class=\"now\">${ch}<\u002Fspan>`;\n      return ch;\n    }).join(\"\");\n    const sumC = COST_24H.reduce((a, b) => a + b, 0);\n\n    const maxT = Math.max(...TOKEN_24H);\n    const tokSpark = TOKEN_24H.map((v, i) => {\n      const idx = Math.max(0, Math.min(7, Math.round((v / maxT) * 7)));\n      const ch = SPARK[idx];\n      if (i === TOKEN_24H.length - 1) return `<span class=\"now\">${ch}<\u002Fspan>`;\n      return ch;\n    }).join(\"\");\n    const sumT = TOKEN_24H.reduce((a, b) => a + b, 0);\n\n    host.innerHTML = `\n      <div class=\"item\">\n        <div class=\"k\">Health<\u002Fdiv>\n        <div class=\"spark\">${healthSpark}<\u002Fdiv>\n        <div class=\"v\"><span class=\"num\">5/6 healthy<\u002Fspan><span class=\"delta down\">↓ 16% an hour ago<\u002Fspan><\u002Fdiv>\n        <div class=\"note\">A single agent went dark; the others recovered.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"item\">\n        <div class=\"k\">Cost · 24h<\u002Fdiv>\n        <div class=\"spark\">${costSpark}<\u002Fdiv>\n        <div class=\"v\"><span class=\"num\">$${sumC.toFixed(2)}<\u002Fspan><span class=\"delta up\">↑ $0.44<\u002Fspan><\u002Fdiv>\n        <div class=\"note\">Spike around 18:00 — Auth cleanup retried twice before going dark.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"item\">\n        <div class=\"k\">Tokens · 24h<\u002Fdiv>\n        <div class=\"spark\">${tokSpark}<\u002Fdiv>\n        <div class=\"v\"><span class=\"num\">${(sumT / 1000).toFixed(1)}k<\u002Fspan><span class=\"delta up\">↑ 12.2k<\u002Fspan><\u002Fdiv>\n        <div class=\"note\">Phase 5.5 and Phase 6 account for most of the recent throughput.<\u002Fdiv>\n      <\u002Fdiv>`;\n  }\n\n  /* ─── Inline detail ───────────────────────────────────────── */\n  let openedTask = null;\n  function toggleDetail(task) {\n    document.querySelectorAll(\".detail\").forEach(d => d.remove());\n    if (openedTask === task) { openedTask = null; return; }\n    openedTask = task;\n    const a = AGENTS.find(x => x.task === task);\n    if (!a) return;\n    const row = document.querySelector(`.roster .row[data-task=\"${cssEsc(task)}\"]`);\n    if (!row) return;\n    const events = a.events.slice(0, 5).map(ev => {\n      const tag = ev.tag ? `<span class=\"tag\">[${esc(ev.tag)}]<\u002Fspan>` : \"\";\n      const sha = ev.sha ? ` <button class=\"sha\" data-sha=\"${esc(ev.sha)}\" type=\"button\">${esc(ev.sha)}<\u002Fbutton>` : \"\";\n      return `<li><span class=\"t\">${esc(relTime(ev.ms))}<\u002Fspan><span class=\"txt ${ev.kind}\">${tag}${esc(ev.text)}${sha}<\u002Fspan><\u002Fli>`;\n    }).join(\"\");\n    const isReady = a.state === \"completed\";\n    const detail = document.createElement(\"div\");\n    detail.className = \"detail\" + (a.attention ? \" attention\" : \"\");\n    detail.innerHTML = `\n      <div class=\"h\"><b>${esc(a.task)}<\u002Fb><\u002Fdiv>\n      <div class=\"stats\">${esc(a.source)} · <b>${a.checkpoint.current}/${a.checkpoint.total}<\u002Fb> checkpoints · ${fmtTokens(a.tokens)} tokens · <b>${fmtCost(a.cost)}<\u002Fb> of $${a.costCeiling.toFixed(2)}${a.silent ? ` · silent <b>${esc(a.silent)}<\u002Fb>` : \"\"}<\u002Fdiv>\n      <div class=\"goal\">${esc(a.goal)}<\u002Fdiv>\n      <ul class=\"events\">${events}<\u002Ful>\n      <div class=\"actions\">\n        <button class=\"bk\" data-act=\"supervise\" data-task=\"${esc(a.task)}\"><span class=\"k\">[s]<\u002Fspan><span class=\"lbl\">Ask Supervisor<\u002Fspan><\u002Fbutton>\n        ${isReady ? `<button class=\"bk go\" data-act=\"merge\" data-task=\"${esc(a.task)}\"><span class=\"k\">[m]<\u002Fspan><span class=\"lbl\">Merge to main<\u002Fspan><\u002Fbutton>` : \"\"}\n        <button class=\"bk\" data-act=\"thread\" data-task=\"${esc(a.task)}\"><span class=\"k\">[o]<\u002Fspan><span class=\"lbl\">Open thread<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>`;\n    row.insertAdjacentElement(\"afterend\", detail);\n  }\n\n  /* ─── Actions ─────────────────────────────────────────────── */\n  function slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, \"-\").replace(/^-|-$/g, \"\"); }\n  function doAction(act, task) {\n    const a = AGENTS.find(x => x.task === task);\n    if (!a) return;\n    if (act === \"supervise\") toast(`routing ${a.task} → supervisor`);\n    else if (act === \"dismiss\") { a.attention = false; toast(`${a.task} marked as handled`); renderFocal(); renderRoster(); }\n    else if (act === \"merge\") {\n      if (a.state !== \"completed\") { toast(`${a.task} not ready to merge`); return; }\n      a.state = \"merged\"; a.attention = false;\n      toast(`merged ${a.task} → main`);\n      renderRoster();\n    }\n    else if (act === \"thread\") toast(`opening thread: ${a.task}`);\n  }\n\n  /* ─── Toast ──────────────────────────────────────────────── */\n  function toast(msg) {\n    let t = document.getElementById(\"toast\");\n    if (!t) { t = document.createElement(\"div\"); t.id = \"toast\"; t.className = \"toast\"; document.body.appendChild(t); }\n    t.textContent = msg;\n    t.classList.add(\"show\");\n    clearTimeout(t._to);\n    t._to = setTimeout(() => t.classList.remove(\"show\"), 1600);\n  }\n\n  /* ─── Notifications + threshold ──────────────────────────── */\n  function initPrefs() {\n    const nb = document.getElementById(\"notify-btn\");\n    const nv = document.getElementById(\"notify-v\");\n    const set = (on) => { nb.dataset.on = on ? \"1\" : \"0\"; nv.textContent = on ? \"on\" : \"off\"; };\n    if (localStorage.getItem(\"ct-notif\") === \"on\" && window.Notification?.permission === \"granted\") set(true);\n    nb.addEventListener(\"click\", async () => {\n      const on = nb.dataset.on === \"1\";\n      if (on) { set(false); localStorage.setItem(\"ct-notif\", \"off\"); toast(\"notifications: off\"); return; }\n      if (!(\"Notification\" in window)) { toast(\"notifications: not supported\"); return; }\n      let perm = Notification.permission;\n      if (perm === \"default\") perm = await Notification.requestPermission();\n      if (perm !== \"granted\") { toast(\"notifications: blocked\"); return; }\n      set(true); localStorage.setItem(\"ct-notif\", \"on\");\n      toast(\"notifications: on\");\n    });\n\n    const tb = document.getElementById(\"thresh-btn\");\n    const tv = document.getElementById(\"thresh-v\");\n    let v = parseFloat(localStorage.getItem(\"ct-threshold\") || \"2\");\n    const drawThresh = () => { tv.textContent = v.toFixed(2); };\n    drawThresh();\n    tb.addEventListener(\"click\", e => {\n      e.stopPropagation();\n      const r = tb.getBoundingClientRect();\n      document.querySelectorAll(\".pop\").forEach(p => p.remove());\n      const pop = document.createElement(\"div\");\n      pop.className = \"pop\";\n      pop.innerHTML = `\n        <div class=\"h\">notify when any agent's cost passes<\u002Fdiv>\n        <div class=\"i\">$<input type=\"number\" step=\"0.25\" min=\"0.25\" value=\"${v.toFixed(2)}\" /><\u002Fdiv>\n        <div class=\"p\">\n          <button data-v=\"0.5\">$0.50<\u002Fbutton>\n          <button data-v=\"1\">$1<\u002Fbutton>\n          <button data-v=\"2\">$2<\u002Fbutton>\n          <button data-v=\"5\">$5<\u002Fbutton>\n          <button data-v=\"10\">$10<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"a\"><button class=\"cancel\">cancel<\u002Fbutton><button class=\"save\">save<\u002Fbutton><\u002Fdiv>`;\n      document.body.appendChild(pop);\n      pop.style.left = Math.max(8, r.left + window.scrollX) + \"px\";\n      pop.style.top = (r.bottom + window.scrollY - pop.offsetHeight - 40) + \"px\";\n      const input = pop.querySelector(\"input\"); input.focus(); input.select();\n      const close = () => pop.remove();\n      const save = () => { const nv = parseFloat(input.value); if (nv > 0) { v = nv; localStorage.setItem(\"ct-threshold\", String(nv)); drawThresh(); toast(`alert ≥ $${nv.toFixed(2)}`); } close(); };\n      pop.querySelector(\".cancel\").addEventListener(\"click\", close);\n      pop.querySelector(\".save\").addEventListener(\"click\", save);\n      pop.querySelectorAll(\".p button\").forEach(b => b.addEventListener(\"click\", () => { input.value = b.dataset.v; input.focus(); }));\n      input.addEventListener(\"keydown\", e => { if (e.key === \"Enter\") save(); if (e.key === \"Escape\") close(); });\n      setTimeout(() => {\n        document.addEventListener(\"click\", function once(e) {\n          if (!pop.contains(e.target) && !tb.contains(e.target)) { close(); document.removeEventListener(\"click\", once); }\n        });\n      }, 0);\n    });\n  }\n\n  /* ─── Selection / nav (vim) ──────────────────────────────── */\n  let selectedTask = null;\n  function selectByTask(task) {\n    document.querySelectorAll(\".roster .row.selected\").forEach(r => r.classList.remove(\"selected\"));\n    selectedTask = task;\n    if (task) {\n      const el = document.querySelector(`.roster .row[data-task=\"${cssEsc(task)}\"]`);\n      if (el) {\n        el.classList.add(\"selected\");\n        // give a subtle background\n        document.querySelectorAll(\".roster .row.selected\").forEach(r => r.style.background = \"var(--bg-soft)\");\n      }\n    }\n  }\n  function stepSelection(delta) {\n    const rows = [...document.querySelectorAll(\".roster .row\")];\n    if (!rows.length) return;\n    let idx = rows.findIndex(r => r.dataset.task === selectedTask);\n    if (idx < 0) idx = delta > 0 ? -1 : rows.length;\n    idx = (idx + delta + rows.length) % rows.length;\n    rows.forEach(r => r.style.background = \"\");\n    selectByTask(rows[idx].dataset.task);\n  }\n\n  /* ─── Command mode ───────────────────────────────────────── */\n  function openCmdMode() {\n    const el = document.getElementById(\"cmdmode\");\n    const input = document.getElementById(\"cmdmode-input\");\n    const mode = document.getElementById(\"mode\");\n    el.classList.add(\"open\");\n    mode.textContent = \"COMMAND\"; mode.className = \"mode\";\n    input.value = \"\"; input.focus();\n  }\n  function closeCmdMode(runText) {\n    const el = document.getElementById(\"cmdmode\");\n    el.classList.remove(\"open\");\n    renderFocal();\n    if (runText) {\n      const cmd = runText.trim();\n      if (!cmd) return;\n      const m = cmd.match(/^(supervise|merge|kill|focus|dismiss)\\s+(.+)$/i);\n      if (m) {\n        const name = m[2].trim().toLowerCase();\n        const found = AGENTS.find(a => slug(a.task).startsWith(name) || a.task.toLowerCase().startsWith(name));\n        if (!found) { toast(`no agent matching '${name}'`); return; }\n        selectByTask(found.task);\n        const act = m[1].toLowerCase();\n        if (act === \"focus\") return;\n        doAction(act, found.task);\n        return;\n      }\n      toast(`unknown: ${cmd}`);\n    }\n  }\n\n  /* ─── Wiring ─────────────────────────────────────────────── */\n  function wire() {\n    document.body.addEventListener(\"click\", e => {\n      const sha = e.target.closest(\".sha\");\n      if (sha) { navigator.clipboard?.writeText(sha.dataset.sha); toast(`copied ${sha.dataset.sha}`); e.stopPropagation(); return; }\n      const act = e.target.closest(\"[data-act]\");\n      if (act) { doAction(act.dataset.act, act.dataset.task); return; }\n      const row = e.target.closest(\".roster .row\");\n      if (row) { toggleDetail(row.dataset.task); return; }\n    });\n\n    document.addEventListener(\"keydown\", e => {\n      if (e.target.matches(\"input, textarea\")) return;\n      const k = e.key;\n      if (k === \"j\" || k === \"ArrowDown\") { e.preventDefault(); stepSelection(+1); }\n      else if (k === \"k\" || k === \"ArrowUp\") { e.preventDefault(); stepSelection(-1); }\n      else if (k === \"Enter\") {\n        e.preventDefault();\n        if (selectedTask) toggleDetail(selectedTask);\n        else {\n          const attn = AGENTS.find(a => a.attention);\n          if (attn) doAction(\"supervise\", attn.task);\n        }\n      }\n      else if (k === \"Escape\") {\n        if (openedTask) toggleDetail(openedTask);\n        else selectByTask(null);\n      }\n      else if (k === \"s\") {\n        if (selectedTask) doAction(\"supervise\", selectedTask);\n        else {\n          const attn = AGENTS.find(a => a.attention);\n          if (attn) doAction(\"supervise\", attn.task);\n        }\n      }\n      else if (k === \"m\" && selectedTask) doAction(\"merge\", selectedTask);\n      else if (k === \"o\" && selectedTask) doAction(\"thread\", selectedTask);\n      else if (k === \".\") {\n        const attn = AGENTS.find(a => a.attention);\n        if (attn) doAction(\"dismiss\", attn.task);\n      }\n      else if (k === \"n\") document.getElementById(\"notify-btn\").click();\n      else if (k === \":\") { e.preventDefault(); openCmdMode(); }\n      else if (k === \"?\") toast(\"↑↓ jk · Enter focus · s sup · m merge · . handled · : cmd\");\n    });\n    document.getElementById(\"cmdmode-input\").addEventListener(\"keydown\", e => {\n      e.stopPropagation();\n      if (e.key === \"Enter\") closeCmdMode(e.target.value);\n      else if (e.key === \"Escape\") closeCmdMode(null);\n    });\n  }\n\n  /* ─── Clock ──────────────────────────────────────────────── */\n  function tick() {\n    const el = document.getElementById(\"ts\");\n    if (el) el.textContent = new Date().toTimeString().slice(0, 8);\n  }\n\n  document.addEventListener(\"DOMContentLoaded\", () => {\n    renderFocal();\n    renderRoster();\n    renderGlance();\n    initPrefs();\n    wire();\n    tick(); setInterval(tick, 1000);\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
